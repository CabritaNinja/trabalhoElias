<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diagrama de Casos de Uso Tradicional (UML)</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f9;
    margin: 0;
    padding: 30px;
    display: flex;
    justify-content: center;
  }
  .diagram-container {
    background-color: #ffffff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    overflow-x: auto;
  }
  svg {
    display: block;
    margin: 0 auto;
    font-family: Arial, sans-serif;
  }
  .actor-text { font-size: 13px; text-anchor: middle; font-weight: bold; }
  .uc-text { font-size: 12px; text-anchor: middle; }
  .system-title { font-size: 14px; font-weight: bold; }
  .module-title { font-size: 12px; font-style: italic; fill: #555; }
  .dep-text { font-size: 11px; font-style: italic; fill: #333; }
</style>
</head>
<body>

<div class="diagram-container">
  <svg width="1000" height="1100" viewBox="0 0 1000 1100">
    <defs>
      <marker id="open-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
        <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#000" stroke-width="1.5" />
      </marker>
    </defs>

    <rect x="220" y="40" width="560" height="1020" fill="#ffffff" stroke="#000" stroke-width="1.5" />
    <text x="500" y="65" text-anchor="middle" class="system-title">Sistema: Backend — Website Inflação Morrinhos-GO</text>

    <rect x="240" y="90" width="520" height="340" fill="none" stroke="#666" stroke-width="1" />
    <text x="250" y="110" class="module-title">Módulo de Consulta e Interação</text>

    <rect x="240" y="450" width="520" height="340" fill="none" stroke="#666" stroke-width="1" />
    <text x="250" y="470" class="module-title">Módulo de Gestão de Dados</text>

    <rect x="240" y="810" width="520" height="230" fill="none" stroke="#666" stroke-width="1" />
    <text x="250" y="830" class="module-title">Módulo de Automação</text>

    <g stroke="#000" stroke-width="1" fill="none">
      <line x1="100" y1="260" x2="360" y2="170" />
      <line x1="100" y1="260" x2="640" y2="170" />
      <line x1="100" y1="260" x2="360" y2="270" />
      <line x1="100" y1="260" x2="640" y2="270" />
      <line x1="100" y1="260" x2="360" y2="370" />

      <line x1="100" y1="620" x2="360" y2="520" />
      <line x1="100" y1="620" x2="640" y2="520" />
      <line x1="100" y1="620" x2="640" y2="620" />
      <line x1="100" y1="620" x2="640" y2="720" />

      <line x1="900" y1="930" x2="500" y2="860" />
      <line x1="900" y1="930" x2="500" y2="940" />
      <line x1="900" y1="930" x2="500" y2="1010" />
    </g>

    <g stroke="#000" stroke-width="1" stroke-dasharray="6,4" fill="none">
      <line x1="455" y1="170" x2="535" y2="170" marker-end="url(#open-arrow)" />
      
      <line x1="455" y1="270" x2="535" y2="270" marker-end="url(#open-arrow)" />
      
      <line x1="455" y1="520" x2="535" y2="520" marker-end="url(#open-arrow)" />
      
      <line x1="435" y1="550" x2="555" y2="600" marker-end="url(#open-arrow)" />
      
      <line x1="640" y1="555" x2="640" y2="575" marker-end="url(#open-arrow)" />
      
      <line x1="640" y1="655" x2="640" y2="675" marker-end="url(#open-arrow)" />
    </g>

    <g class="dep-text" text-anchor="middle">
      <rect x="465" y="155" width="60" height="14" fill="#fff" />
      <text x="495" y="166">&lt;&lt;include&gt;&gt;</text>
      
      <rect x="465" y="255" width="60" height="14" fill="#fff" />
      <text x="495" y="266">&lt;&lt;include&gt;&gt;</text>
      
      <rect x="465" y="505" width="60" height="14" fill="#fff" />
      <text x="495" y="516">&lt;&lt;include&gt;&gt;</text>
      
      <rect x="460" y="570" width="60" height="14" fill="#fff" />
      <text x="490" y="581">&lt;&lt;include&gt;&gt;</text>
      
      <rect x="650" y="558" width="60" height="14" fill="#fff" />
      <text x="680" y="569">&lt;&lt;extend&gt;&gt;</text>
      
      <rect x="650" y="658" width="60" height="14" fill="#fff" />
      <text x="680" y="669">&lt;&lt;include&gt;&gt;</text>
    </g>

    <g transform="translate(100, 260)">
      <circle cx="0" cy="-35" r="12" fill="#fff" stroke="#000" stroke-width="2"/>
      <line x1="0" y1="-23" x2="0" y2="15" stroke="#000" stroke-width="2"/>
      <line x1="-20" y1="-10" x2="20" y2="-10" stroke="#000" stroke-width="2"/>
      <line x1="0" y1="15" x2="-15" y2="45" stroke="#000" stroke-width="2"/>
      <line x1="0" y1="15" x2="15" y2="45" stroke="#000" stroke-width="2"/>
      <text x="0" y="70" class="actor-text">Cidadão</text>
      <text x="0" y="85" class="actor-text" font-weight="normal">(Usuário)</text>
    </g>

    <g transform="translate(100, 620)">
      <circle cx="0" cy="-35" r="12" fill="#fff" stroke="#000" stroke-width="2"/>
      <line x1="0" y1="-23" x2="0" y2="15" stroke="#000" stroke-width="2"/>
      <line x1="-20" y1="-10" x2="20" y2="-10" stroke="#000" stroke-width="2"/>
      <line x1="0" y1="15" x2="-15" y2="45" stroke="#000" stroke-width="2"/>
      <line x1="0" y1="15" x2="15" y2="45" stroke="#000" stroke-width="2"/>
      <text x="0" y="70" class="actor-text">Administrador</text>
      <text x="0" y="85" class="actor-text" font-weight="normal">(Pesquisador)</text>
    </g>

    <g transform="translate(900, 930)">
      <circle cx="0" cy="-35" r="12" fill="#fff" stroke="#000" stroke-width="2"/>
      <line x1="0" y1="-23" x2="0" y2="15" stroke="#000" stroke-width="2"/>
      <line x1="-20" y1="-10" x2="20" y2="-10" stroke="#000" stroke-width="2"/>
      <line x1="0" y1="15" x2="-15" y2="45" stroke="#000" stroke-width="2"/>
      <line x1="0" y1="15" x2="15" y2="45" stroke="#000" stroke-width="2"/>
      <text x="0" y="70" class="actor-text">Sistema</text>
      <text x="0" y="85" class="actor-text" font-weight="normal">(Servidor)</text>
    </g>

    <g stroke="#000" stroke-width="1.5" fill="#ffffff">
      
      <g transform="translate(360, 170)">
        <ellipse cx="0" cy="0" rx="95" ry="35" />
        <text x="0" y="-5" class="uc-text" stroke="none" fill="#000">Consultar inflação da</text>
        <text x="0" y="10" class="uc-text" stroke="none" fill="#000">cesta pré-definida</text>
      </g>
      <g transform="translate(640, 170)">
        <ellipse cx="0" cy="0" rx="95" ry="35" />
        <text x="0" y="-5" class="uc-text" stroke="none" fill="#000">Obter dados para</text>
        <text x="0" y="10" class="uc-text" stroke="none" fill="#000">gráficos e tabelas</text>
      </g>
      <g transform="translate(360, 270)">
        <ellipse cx="0" cy="0" rx="95" ry="35" />
        <text x="0" y="-5" class="uc-text" stroke="none" fill="#000">Calcular inflação</text>
        <text x="0" y="10" class="uc-text" stroke="none" fill="#000">personalizada</text>
      </g>
      <g transform="translate(640, 270)">
        <ellipse cx="0" cy="0" rx="95" ry="35" />
        <text x="0" y="-5" class="uc-text" stroke="none" fill="#000">Consultar dados</text>
        <text x="0" y="10" class="uc-text" stroke="none" fill="#000">históricos de preços</text>
      </g>
      <g transform="translate(360, 370)">
        <ellipse cx="0" cy="0" rx="95" ry="35" />
        <text x="0" y="-5" class="uc-text" stroke="none" fill="#000">Enviar feedback</text>
        <text x="0" y="10" class="uc-text" stroke="none" fill="#000">sobre a plataforma</text>
      </g>

      <g transform="translate(360, 520)">
        <ellipse cx="0" cy="0" rx="95" ry="35" />
        <text x="0" y="-5" class="uc-text" stroke="none" fill="#000">Autenticar no</text>
        <text x="0" y="10" class="uc-text" stroke="none" fill="#000">sistema</text>
      </g>
      <g transform="translate(640, 520)">
        <ellipse cx="0" cy="0" rx="95" ry="35" />
        <text x="0" y="-12" class="uc-text" stroke="none" fill="#000">Gerenciar produtos</text>
        <text x="0" y="3" class="uc-text" stroke="none" fill="#000">e categorias</text>
        <text x="0" y="18" class="uc-text" stroke="none" fill="#000">da cesta</text>
      </g>
      <g transform="translate(640, 620)">
        <ellipse cx="0" cy="0" rx="95" ry="35" />
        <text x="0" y="-5" class="uc-text" stroke="none" fill="#000">Registrar preços</text>
        <text x="0" y="10" class="uc-text" stroke="none" fill="#000">coletados (quinz.)</text>
      </g>
      <g transform="translate(640, 720)">
        <ellipse cx="0" cy="0" rx="95" ry="35" />
        <text x="0" y="-5" class="uc-text" stroke="none" fill="#000">Validar e tratar</text>
        <text x="0" y="10" class="uc-text" stroke="none" fill="#000">dados de preços</text>
      </g>

      <g transform="translate(500, 860)">
        <ellipse cx="0" cy="0" rx="95" ry="35" />
        <text x="0" y="-5" class="uc-text" stroke="none" fill="#000">Executar rotina de</text>
        <text x="0" y="10" class="uc-text" stroke="none" fill="#000">atualização</text>
      </g>
      <g transform="translate(500, 940)">
        <ellipse cx="0" cy="0" rx="95" ry="35" />
        <text x="0" y="-5" class="uc-text" stroke="none" fill="#000">Realizar backup</text>
        <text x="0" y="10" class="uc-text" stroke="none" fill="#000">automático do banco</text>
      </g>
      <g transform="translate(500, 1010)">
        <ellipse cx="0" cy="0" rx="95" ry="35" />
        <text x="0" y="-5" class="uc-text" stroke="none" fill="#000">Registrar logs e</text>
        <text x="0" y="10" class="uc-text" stroke="none" fill="#000">monitorar uptime</text>
      </g>

    </g>
  </svg>
</div>

</body>
</html>
